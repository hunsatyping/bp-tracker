<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บันทึกความดันโลหิต</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root {
  --blue-900: #0c3e8a;
  --blue-700: #1e5fd6;
  --blue-500: #3b82f6;
  --blue-100: #dbe9ff;
  --blue-50: #eef4ff;
  --ink: #0f2247;
  --gray: #6b7a99;
}
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 20px; background: var(--blue-50); color: var(--ink); font-size: 17px; }
h1 { font-size: 26px; font-weight: 700; margin: 0 0 4px; color: var(--blue-900); }
#userInfo { font-size: 15px; color: var(--gray); margin-bottom: 20px; }
form { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; background: #fff; padding: 18px; border-radius: 16px; box-shadow: 0 2px 10px rgba(12,62,138,0.08); }
label { display: flex; flex-direction: column; font-size: 15px; font-weight: 600; color: var(--blue-900); gap: 6px; }
input { padding: 12px; border: 2px solid var(--blue-100); border-radius: 10px; font-size: 18px; color: var(--ink); background: var(--blue-50); }
input:focus { outline: none; border-color: var(--blue-500); background: #fff; }
.row { display: flex; gap: 10px; }
.row label { flex: 1; }
.bp-input { font-size: 30px; font-weight: 700; text-align: center; letter-spacing: 2px; max-width: 220px; }
button { padding: 14px; border: none; border-radius: 10px; background: var(--blue-700); color: #fff; font-size: 17px; font-weight: 700; cursor: pointer; }
button:active { background: var(--blue-900); }
.tabs { display: flex; gap: 10px; margin-bottom: 14px; }
.tabs button { flex: 1; background: var(--blue-100); color: var(--blue-900); border-radius: 10px; }
.tabs button.active { background: var(--blue-700); color: #fff; }
table { width: 100%; border-collapse: collapse; font-size: 15px; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 10px rgba(12,62,138,0.08); }
th, td { padding: 10px 8px; text-align: center; }
th { background: var(--blue-700); color: #fff; font-weight: 600; }
tr:nth-child(even) td { background: var(--blue-50); }
.del { background: #d64545; padding: 6px 10px; font-size: 13px; border-radius: 8px; }
canvas { background: #fff; padding: 12px; border-radius: 12px; box-shadow: 0 2px 10px rgba(12,62,138,0.08); }
</style>
</head>
<body>
<div id="app">
  <h1>บันทึกความดันโลหิต</h1>
  <div id="userInfo">กำลังโหลด...</div>
  <form id="bpForm">
    <div class="row">
      <label>วันที่<input type="date" id="date" required></label>
      <label>เวลา<input type="time" id="time" required></label>
    </div>
    <label>ความดัน (บน/ล่าง)<input type="text" id="bp" class="bp-input" inputmode="numeric" placeholder="120/80" required></label>
    <label>หมายเหตุ<input type="text" id="note"></label>
    <button type="submit">บันทึก</button>
  </form>
  <div class="tabs">
    <button id="tabTable" class="active">ตาราง</button>
    <button id="tabChart">กราฟ</button>
  </div>
  <div id="tableView">
    <table id="bpTable">
      <thead><tr><th>วันที่</th><th>เวลา</th><th>บน</th><th>ล่าง</th><th>หมายเหตุ</th><th></th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div id="chartView" style="display:none">
    <canvas id="bpChart"></canvas>
  </div>
</div>
<script>
const LIFF_ID = "2010792403-kdPdSofl";
const firebaseConfig = {
  apiKey: "AIzaSyC9hX3n6TNkzYwg75oFBCs7qeqKGQyXDgk",
  authDomain: "bptracker-db4b5.firebaseapp.com",
  projectId: "bptracker-db4b5",
  storageBucket: "bptracker-db4b5.firebasestorage.app",
  messagingSenderId: "565271148649",
  appId: "1:565271148649:web:27fc897985a9ca6fe4caf8",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let userId = "guest";
let records = [];
let chartInstance = null;
let autoTime = true;
let clockTimer = null;

function startClock() {
  if (clockTimer) clearInterval(clockTimer);
  autoTime = true;
  const timeInput = document.getElementById('time');
  timeInput.value = new Date().toTimeString().slice(0, 5);
  clockTimer = setInterval(() => {
    if (autoTime) timeInput.value = new Date().toTimeString().slice(0, 5);
  }, 1000);
}

document.getElementById('time').addEventListener('input', () => {
  autoTime = false;
});

function formatBP(raw) {
  let digits = raw.replace(/\D/g, '');
  if (!digits) return '';
  const sysLen = digits[0] === '1' ? 3 : 2;
  digits = digits.slice(0, sysLen + 2);
  const sys = digits.slice(0, sysLen);
  const dia = digits.slice(sysLen);
  return dia ? `${sys}/${dia}` : sys;
}

document.getElementById('bp').addEventListener('input', (e) => {
  e.target.value = formatBP(e.target.value);
});
async function init() {
  document.getElementById('date').value = new Date().toISOString().slice(0, 10);
  startClock();
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }
    const profile = await liff.getProfile();
    userId = profile.userId;
    document.getElementById('userInfo').textContent = profile.displayName;
  } catch (e) {
    document.getElementById('userInfo').textContent = "โหมดทดสอบ (ยังไม่ได้ตั้งค่า LIFF_ID)";
  }
  await loadRecords();
  renderTable();
}

async function loadRecords() {
  try {
    const doc = await db.collection('users').doc(userId).get();
    records = doc.exists ? (doc.data().records || []) : [];
  } catch (e) {
    records = [];
  }
}

async function saveRecords() {

  try {
    await db.collection('users').doc(userId).set({ records }, { merge: true });
  } catch (e) {
    alert("บันทึกข้อมูลไม่สำเร็จ");
  }
}

document.getElementById('bpForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const bpValue = document.getElementById('bp').value;
  const [sysStr, diaStr] = bpValue.split('/');
  if (!sysStr || !diaStr) {
    alert("กรุณากรอกค่าความดันให้ครบ เช่น 120/80");
    return;
  }
  const record = {
    id: Date.now().toString(),
    date: document.getElementById('date').value,
    time: document.getElementById('time').value,



    systolic: Number(sysStr),
    diastolic: Number(diaStr),
    note: document.getElementById('note').value.trim()
  };
  records.push(record);
  records.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));
  await saveRecords();
  renderTable();
  if (document.getElementById('chartView').style.display !== 'none') renderChart();
  e.target.reset();
  document.getElementById('date').value = new Date().toISOString().slice(0, 10);
  startClock();
});

function renderTable() {
  const tbody = document.querySelector('#bpTable tbody');
  tbody.innerHTML = '';
  [...records].reverse().forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${r.date}</td><td>${r.time}</td><td>${r.systolic}</td><td>${r.diastolic}</td><td>${r.note || ''}</td><td><button data-id="${r.id}" class="del">ลบ</button></td>`;
    tbody.appendChild(tr);
  });
  tbody.querySelectorAll('.del').forEach(btn => {
    btn.addEventListener('click', async () => {
      records = records.filter(r => r.id !== btn.dataset.id);
      await saveRecords();
      renderTable();
      if (document.getElementById('chartView').style.display !== 'none') renderChart();
    });
  });
}

function renderChart() {
  const ctx = document.getElementById('bpChart');
  const labels = records.map(r => `${r.date} ${r.time}`);
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'บน', data: records.map(r => r.systolic), borderColor: '#c0392b', tension: 0.2 },
        { label: 'ล่าง', data: records.map(r => r.diastolic), borderColor: '#2980b9', tension: 0.2 }
      ]
    },
    options: {
      responsive: true,
      scales: {
        y: { min: 0, max: 200 }
      }
    }
  });
}

function switchTab(tab) {
  const isTable = tab === 'table';
  document.getElementById('tableView').style.display = isTable ? 'block' : 'none';
  document.getElementById('chartView').style.display = isTable ? 'none' : 'block';
  document.getElementById('tabTable').classList.toggle('active', isTable);
  document.getElementById('tabChart').classList.toggle('active', !isTable);
  if (!isTable) renderChart();
}

document.getElementById('tabTable').addEventListener('click', () => switchTab('table'));
document.getElementById('tabChart').addEventListener('click', () => switchTab('chart'));

init();
</script>
</body>
</html>
